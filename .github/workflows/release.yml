name: release
on:
  push:
    tags:
      - "*.*.*"
      - "v*"
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,full]"
      - run: ruff check wtftools tests
      - run: pytest

  deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install Debian packaging toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dh-python debhelper fakeroot build-essential
      - name: Build .deb
        run: bash scripts/build-deb.sh
      - name: Upload .deb to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: deb_dist/*.deb
          generate_release_notes: true
