name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,full]"

      - name: Lint
        run: ruff check wtftools tests

      - name: Test (with coverage gate)
        run: pytest

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal (no extras)
        run: python -m pip install -e .
      - name: Smoke run
        run: |
          wtf --version
          wtf doctor
          wtf info > /dev/null
          wtf audit --only problem || true
          wtf audit --check uptime --check load
          wtf audit --list-checks
          wtf audit --brief || true
          wtf plugins
